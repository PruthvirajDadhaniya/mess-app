<mat-toolbar class="navbar">

    <div class="logo">
        <img src="../../../../../assets/images/brand-logo.png" alt="Find Food Logo" class="logo-img" />
    </div>

    <div class="nav-links">
        <a class="active-link">Home</a>
        <a>Service</a>
        <a>Support</a>
        <a>About</a>
    </div>

    <!-- Mobile Menu Button -->
    <button mat-icon-button class="mobile-menu-btn" (click)="toggleMenu()">
        <mat-icon>menu</mat-icon>
    </button>

    <div class="nav-actions">
        <button mat-icon-button>
            <mat-icon>favorite_border</mat-icon>
        </button>

        <button mat-raised-button color="primary" class="signin-btn" (click)="onClick()">
            <mat-icon>person_outline</mat-icon>
        </button>
    </div>

</mat-toolbar>

<!-- Mobile Sidenav -->
<div class="mobile-nav" [class.open]="isMenuOpen">
    <div class="mobile-nav-header">
        <img src="assets/images/brand-logo.png" alt="Logo" class="mobile-logo">
        <button mat-icon-button class="close-btn" (click)="closeMenu()">
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <div class="mobile-nav-links">
        <a (click)="closeMenu()">
            <mat-icon>home</mat-icon>
            <span>Home</span>
        </a>
        <a (click)="closeMenu()">
            <mat-icon>room_service</mat-icon>
            <span>Service</span>
        </a>
        <a (click)="closeMenu()">
            <mat-icon>support_agent</mat-icon>
            <span>Support</span>
        </a>
        <a (click)="closeMenu()">
            <mat-icon>info</mat-icon>
            <span>About</span>
        </a>
    </div>
</div>

@if (isMenuOpen) {
<div class="mobile-overlay" (click)="closeMenu()">
</div>
}
