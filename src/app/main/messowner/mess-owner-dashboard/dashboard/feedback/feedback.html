<div class="container">

  <div class="header">
    <h1>Good Morning, Joe!</h1>
    <p>It's time to track your finance and services.</p>
  </div>

  <div class="review-section">

    <h2>Customer review</h2>
    <p class="subtitle">based on 397 ratings by customers</p>

    <div class="review-card" *ngFor="let item of reviews">

      <div class="profile">
        <div class="avatar">
          <i class="fa-solid fa-user"></i>
        </div>

        <div class="name">
          {{item.name}}
        </div>
      </div>

      <div class="stars">
        ★ ★ ★ ★ ★
      </div>

      <h4>{{item.title}}</h4>

      <p class="desc">
        {{item.description}}
      </p>

    </div>

    <div class="pagination">

      <button>&laquo;</button>
      <button>&lsaquo;</button>

      <button>1</button>
      <button>2</button>
      <button class="active">3</button>

      <span>...</span>

      <button>10</button>

      <button>&rsaquo;</button>
      <button>&raquo;</button>

    </div>

  </div>

</div>
