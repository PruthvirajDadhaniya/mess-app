<div class="sidebar">

  <a class="menu-item" routerLink="/mess-owner-dashboard" routerLinkActive="active"
    [routerLinkActiveOptions]="{ exact: true }" (click)="onMenuClick()">
    <span class="icon">
      <i class="fa-solid fa-table-cells-large"></i>
    </span>
    <span>Dashboard</span>
  </a>


  <a class="menu-item" routerLink="/mess-owner-dashboard/details" routerLinkActive="active" (click)="onMenuClick()">
    <span class="icon">
      <i class="fa-regular fa-user"></i>
    </span>
    <span>Details</span>
  </a>

  <a class="menu-item" routerLink="/mess-owner-dashboard/menu" routerLinkActive="active" (click)="onMenuClick()">
    <span class="icon">
      <i class="fa-solid fa-utensils"></i>
    </span>
    <span>Menu</span>
  </a>

  <a class="menu-item" routerLink="/mess-owner-dashboard/price" routerLinkActive="active" (click)="onMenuClick()">
    <span class="icon">
      <i class="fa-solid fa-wallet"></i>
    </span>
    <span>Price</span>
  </a>

  <a class="menu-item" routerLink="/mess-owner-dashboard/time" routerLinkActive="active" (click)="onMenuClick()">
    <span class="icon">
      <i class="fa-regular fa-clock"></i>
    </span>
    <span>Time</span>
  </a>

  <a class="menu-item" routerLink="/mess-owner-dashboard/feedback" routerLinkActive="active" (click)="onMenuClick()">
    <span class="icon">
      <i class="fa-regular fa-comment-dots"></i>
    </span>
    <span>Feedback</span>
  </a>

</div>
