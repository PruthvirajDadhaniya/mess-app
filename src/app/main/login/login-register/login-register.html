<div *ngIf="!showRegister">
  <div class="page-wrapper">

    <!-- Background Image -->
    <div class="food-bg">
      <img src="../../../../../assets/images/background.png" alt="food-background" class="bg-img">
    </div>

    <!-- Login Card -->
    <div class="login-card">

      <!-- Logo -->
      <div class="logo-wrap">
        <img src="../../../../../assets/images/brand-logo.png" alt="FindFood Logo" class="logo-img">
      </div>

      <!-- Title -->
      <h2 class="welcome-title">Welcome Back !</h2>

      <p class="sub-title">Sign in to your account</p>

      <!-- Role Tabs -->
      <div class="role-tabs">
        <button class="role-btn" [class.active-role]="selectedRole === 'owner'" (click)="selectedRole = 'owner'">
          Mess Owner
        </button>

        <button class="role-btn" [class.active-role]="selectedRole === 'customer'" (click)="selectedRole = 'customer'">
          Customer
        </button>
      </div>

      <!-- Email -->
      <div class="input-group">
        <label>Your Email</label>
        <mat-form-field appearance="outline">
          <input matInput placeholder="jonephilip@gmail.com">
        </mat-form-field>
      </div>

      <!-- Password -->
      <div class="input-group">
        <label>Password</label>
        <mat-form-field appearance="outline">
          <input matInput [type]="hidePassword ? 'password' : 'text'" placeholder="••••••••">
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>
              {{ hidePassword ? 'visibility_off' : 'visibility' }}
            </mat-icon>
          </button>
        </mat-form-field>
      </div>

      <!-- Forgot -->
      <div class="forgot-wrapper">
        <span>Forgot Password ?</span>
      </div>

      <!-- Captcha -->
      <div class="captcha-box">
        <input type="text" placeholder="Enter Captcha">
        <button class="refresh-btn"><i class="fa fa-refresh" aria-hidden="true"></i></button>
        <div class="captcha-code">
          kpoh89
        </div>
      </div>

      <!-- Login -->
      <button class="login-btn">
        Login
      </button>

      <!-- Divider -->
      <div class="divider">
        <div class="divider-line"></div>
        <span>Or Login With</span>
        <div class="divider-line"></div>
      </div>

      <!-- Google -->
      <button type="button" class="btn-google">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4"
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
          <path fill="#34A853"
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
          <path fill="#FBBC05"
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
          <path fill="#EA4335"
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
        </svg>
        Continue with Google
      </button>

      <!-- Register -->
      <p class="register-text">Don’t have any account ?
        <a (click)="showRegister = true">
          Register
        </a>
      </p>
    </div>
  </div>
</div>
