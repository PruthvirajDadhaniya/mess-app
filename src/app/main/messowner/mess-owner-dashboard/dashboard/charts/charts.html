<div class="dashboard">

  <h1>Good Morning, Joe!</h1>
  <p>It's time to track your finance and services.</p>

  <div class="stats-container">

    <div class="card">
      <h4>Customer Review</h4>
      <div class="rating">
        <span>4.5 ⭐⭐⭐⭐☆</span>
      </div>

      <div class="progress blue"></div>
      <div class="progress green"></div>
      <div class="progress yellow"></div>
      <div class="progress orange"></div>
      <div class="progress red"></div>
    </div>

    <div class="card">
      <h4>Food Preference</h4>

      <div class="pie-chart">
        <div class="center">100%</div>
      </div>

      <div class="labels">
        <span>Veg 20%</span>
        <span>Non-Veg 80%</span>
      </div>
    </div>

    <div class="card views-card">
      <h4>Total Views</h4>
      <div class="views">
        580 <i class="fa-regular fa-eye"></i>
      </div>
    </div>

  </div>

  <div class="chart-header">
    <h2>Customer Visit</h2>

    <div class="filters">
      <button>Daily</button>
      <button>Weekly</button>
      <button class="active">Monthly</button>
      <button>Yearly</button>
    </div>
  </div>

  <div class="chart-card">
    <div class="bar-container">
      <div class="bar" style="height: 10%"></div>
      <div class="bar" style="height: 35%"></div>
      <div class="bar" style="height: 65%"></div>
      <div class="bar" style="height: 80%"></div>
      <div class="bar" style="height: 20%"></div>
      <div class="bar" style="height: 85%"></div>
      <div class="bar" style="height: 72%"></div>
    </div>

    <div class="months">
      <span>Jan</span>
      <span>Feb</span>
      <span>Mar</span>
      <span>Apr</span>
      <span>May</span>
      <span>Jun</span>
      <span>Jul</span>
    </div>
  </div>

</div>
