<div class="food-bg">
  <img src="../../../../../assets/images/background.png" class="bg-img" alt="">
</div>

<div class="page-wrapper">
  <mat-card class="auth-card">

    <div class="logo-wrap">
      <img src="../../../../../assets/images/brand-logo.png" class="logo-img" alt="Logo">
    </div>

    <div class="stepper">
      <div class="step" [ngClass]="{'active': currentStep === 1}" (click)="goToStep(1)">
        <div class="step-num">1</div>
        <span>Mess Details</span>
      </div>
      <div class="step-line" [ngClass]="{'active': currentStep === 1}"></div>

      <div class="step" [ngClass]="{'active': currentStep === 2}" (click)="goToStep(2)">
        <div class="step-num">2</div>
        <span>Menu</span>
      </div>
      <div class="step-line" [ngClass]="{'active': currentStep === 2}"></div>

      <div class="step" [ngClass]="{'active': currentStep === 3}" (click)="goToStep(3)">
        <div class="step-num">3</div>
        <span>Price</span>
      </div>
      <div class="step-line" [ngClass]="{'active': currentStep === 3}"></div>

      <div class="step" [ngClass]="{'active': currentStep === 4}" (click)="goToStep(4)">
        <div class="step-num">4</div>
        <span>Time</span>
      </div>
    </div>

    <label class="form-label">Monthly membership charges</label>
    <mat-form-field appearance="outline" class="full-width section-gap">
      <span matTextPrefix>₹&nbsp;</span>
      <input matInput type="number" min="0" placeholder="Enter amount">
    </mat-form-field>

    <label class="form-label">Single time meal charges</label>
    <mat-form-field appearance="outline" class="full-width section-gap">
      <span matTextPrefix>₹&nbsp;</span>
      <input matInput type="number" min="0" placeholder="Enter amount">
    </mat-form-field>

    <label class="form-label">Special day veg charges</label>
    <mat-form-field appearance="outline" class="full-width section-gap">
      <span matTextPrefix>₹&nbsp;</span>
      <input matInput type="number" min="0" placeholder="Enter amount">
    </mat-form-field>

    <label class="form-label">Special day non-veg charges</label>
    <mat-form-field appearance="outline" class="full-width section-gap">
      <span matTextPrefix>₹&nbsp;</span>
      <input matInput type="number" min="0" placeholder="Enter amount">
    </mat-form-field>

  <!-- Back / Next -->
     <div class="actions">
      <button mat-stroked-button class="btn-back" (click)="onBack()">Back</button>
      <button mat-raised-button class="btn-next" (click)="onNext()">Next</button>
    </div>
  </mat-card>
</div>
