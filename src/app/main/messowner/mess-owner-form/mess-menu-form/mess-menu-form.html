<div class="page-wrapper">
  <div class="food-bg">
    <img src="../../../../../assets/images/background.png"
         alt="food-background" class="bg-img">
  </div>

  <div class="form-card">

    <!-- Logo -->
    <div class="logo-wrap">
      <img src="../../../../../assets/images/brand-logo.png"
           alt="FindFood Logo" class="logo-img">
    </div>

    <!-- Stepper -->
    <div class="stepper">
      <div class="step done" (click)="goToStep(1)">
        <div class="step-num done-num">1</div>
        <span>Mess Details</span>
      </div>
      <div class="step-line"></div>
      <div class="step active">
        <div class="step-num active-num">2</div>
        <span>Menu</span>
      </div>
      <div class="step-line"></div>
      <div class="step" (click)="goToStep(3)">
        <div class="step-num">3</div>
        <span>Price</span>
      </div>
      <div class="step-line"></div>
      <div class="step" (click)="goToStep(4)">
        <div class="step-num">4</div>
        <span>Time</span>
      </div>
    </div>

    <!-- Menu Label -->
    <p class="menu-label">Menu</p>

    <!-- Meal Type Toggle Tabs -->
    <div class="meal-tabs">
      <button
        type="button"
        class="meal-tab"
        [class.active]="activeMealTab === 'morning'"
        (click)="switchTab('morning')">
        Morning Meals
      </button>
      <button
        type="button"
        class="meal-tab"
        [class.active]="activeMealTab === 'evening'"
        (click)="switchTab('evening')">
        Evening Meal
      </button>
    </div>

    <!-- Day Accordion List -->
    <div class="days-list">
      <div class="day-block" *ngFor="let day of days; let i = index">

        <!-- Day Header Row -->
        <div
          class="day-header"
          [class.is-open]="day.isOpen"
          (click)="toggleDay(i)">
          <span class="day-name">{{ day.name }}</span>
          <mat-icon class="arrow-icon">
            {{ day.isOpen ? 'keyboard_arrow_up' : 'keyboard_arrow_down' }}
          </mat-icon>
        </div>

        <!-- Expanded Body -->
        <div class="day-body" *ngIf="day.isOpen">

          <!-- Checkbox Items Grid -->
          <div class="cb-grid">
            <div
              class="cb-item"
              *ngFor="let item of day.items"
              (click)="toggleItem(day, item)">
              <div class="cb-box" [class.checked]="item.checked">
                <mat-icon class="cb-tick" *ngIf="item.checked">check</mat-icon>
              </div>
              <span class="cb-text">{{ item.name }}</span>
            </div>
          </div>

          <!-- Add Menu Item -->
          <p class="add-menu-label">Add your menu</p>
          <div class="add-row">
            <input
              class="add-input"
              type="text"
              [(ngModel)]="day.newItem"
              (keydown.enter)="addItem(day)"
              placeholder="">
            <button
              type="button"
              class="btn-add"
              (click)="addItem(day)">
              Add
            </button>
          </div>

        </div>
      </div>
    </div>

    <!-- Back / Next -->
    <div class="btn-row">
      <button mat-stroked-button type="button"
              class="btn-back" (click)="onBack()">
        Back
      </button>
      <button mat-flat-button type="button"
              class="btn-next" (click)="onNext()">
        Next
      </button>
    </div>

  </div>
</div>
