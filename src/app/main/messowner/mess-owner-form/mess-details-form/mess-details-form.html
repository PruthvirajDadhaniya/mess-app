<div class="page-wrapper">

  <!-- Background Image -->
  <div class="food-bg">
    <img src="../../../../../assets/images/background.png" 
         alt="food-background" class="bg-img">
  </div>

  <!-- Form Card -->
  <div class="form-card">

    <!-- Logo -->
    <div class="logo-wrap">
      <img src="../../../../../assets/images/brand-logo.png" 
           alt="FindFood Logo" class="logo-img">
    </div>

    <!-- Stepper -->
    <div class="stepper">
      <div class="step active" (click)="goToStep(1)">
        <div class="step-num">1</div>
        <span>Mess Details</span>
      </div>
      <div class="step-line"></div>
      <div class="step" (click)="goToStep(2)">
        <div class="step-num">2</div>
        <span>Menu</span>
      </div>
      <div class="step-line"></div>
      <div class="step" (click)="goToStep(3)">
        <div class="step-num">3</div>
        <span>Price</span>
      </div>
      <div class="step-line"></div>
      <div class="step" (click)="goToStep(4)">
        <div class="step-num">4</div>
        <span>Time</span>
      </div>
    </div>

    <!-- Reactive Form -->
   <form [formGroup]="messForm" (ngSubmit)="onNext()">

  <!-- Name -->
  <div class="section-gap">
    <label class="form-label">Name</label>
    <mat-form-field appearance="outline" class="full-field">
      <input matInput placeholder="Name*" formControlName="name">
    </mat-form-field>
  </div>

  <!-- Address -->
  <div class="section-gap" formGroupName="address">
    <label class="form-label">Address</label>
    <div class="row-2">
      <mat-form-field appearance="outline" class="full-field">
        <input matInput placeholder="Shop number/Building number*"
               formControlName="shopNumber">
      </mat-form-field>
      <mat-form-field appearance="outline" class="full-field">
        <input matInput placeholder="Area/Locality*"
               formControlName="area">
      </mat-form-field>
    </div>
    <div class="row-2">
      <mat-form-field appearance="outline" class="full-field">
        <input matInput placeholder="City*" formControlName="city">
      </mat-form-field>
      <mat-form-field appearance="outline" class="full-field">
        <input matInput placeholder="Pincode*"
               formControlName="pincode" maxlength="6">
      </mat-form-field>
    </div>
    <mat-form-field appearance="outline" class="full-field">
      <input matInput placeholder="Add nearby landmark*"
             formControlName="landmark">
    </mat-form-field>
  </div>

  <!-- Contact + Email -->
  <div class="section-gap">
    <div class="row-2">
      <div>
        <label class="form-label">Contact</label>
        <mat-form-field appearance="outline" class="full-field">
          <input matInput placeholder="Mobile number*"
                 formControlName="mobile" maxlength="10">
        </mat-form-field>
      </div>
      <div>
        <label class="form-label">Email</label>
        <mat-form-field appearance="outline" class="full-field">
          <input matInput type="email" placeholder="Email ID*"
                 formControlName="email">
        </mat-form-field>
      </div>
    </div>
  </div>

  <!-- License -->
  <div class="section-gap">
    <label class="form-label">License</label>
    <div class="row-2">
      <mat-form-field appearance="outline" class="full-field">
        <input matInput placeholder="Food license number*"
               formControlName="licenseNumber">
      </mat-form-field>
      <div class="upload-col">
        <button type="button" class="btn-upload"
                (click)="licenseInput.click()">
          <mat-icon>upload</mat-icon>
          Upload license image
        </button>
        <input #licenseInput type="file" accept="image/*"
               class="hidden-file"
               (change)="onLicenseSelected($event)">
        <div *ngIf="licenseFileName" class="file-success">
          <mat-icon class="small-icon">check_circle</mat-icon>
          {{ licenseFileName }}
        </div>
      </div>
    </div>
  </div>

  <!-- Food Type -->
  <div class="section-gap">
    <label class="form-label">Food you serve</label>
    <div class="food-type-group">
      <button
        *ngFor="let option of foodOptions"
        type="button"
        class="food-pill"
        [class.active]="messForm.get('foodType')?.value === option"
        (click)="selectFoodType(option)">
        {{ option }}
      </button>
    </div>
  </div>

  <!-- Mess Images -->
  <div class="section-gap">
    <label class="form-label">Add your mess images</label>
    <div class="drop-zone"
         (click)="messImagesInput.click()"
         (dragover)="$event.preventDefault(); isDragOver = true"
         (dragleave)="isDragOver = false"
         (drop)="onImageDrop($event)"
         [class.drag-active]="isDragOver">
      <div class="upload-icon">
        <mat-icon>cloud_upload</mat-icon>
      </div>
      <span *ngIf="!messImageCount">
        Drag &amp; Drop or
        <a (click)="$event.stopPropagation(); messImagesInput.click()">
          Choose file
        </a>
        to upload
      </span>
      <span *ngIf="messImageCount" class="success-text">
        <mat-icon class="small-icon">check_circle</mat-icon>
        {{ messImageCount }} file(s) selected
      </span>
    </div>
    <input #messImagesInput type="file" multiple accept="image/*"
           class="hidden-file"
           (change)="onMessImagesSelected($event)">
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button mat-stroked-button type="button" class="btn-back" (click)="onBack()">
      Back
    </button>
    <button mat-flat-button  class="btn-next" (click)="onNext()">
      Next
    </button>
  </div>

</form>
  </div>
</div>
