<!-- Fixed background -->
<div class="food-bg">
  <img src="../../../../../assets/images/82cb412151f7682e2e865f0a22d49f3afccf6b75.png" class="bg-img" alt="">
</div>

<!-- Scrollable wrapper -->
<div class="page-wrapper">
  <mat-card class="auth-card">

    <!-- Logo -->
    <div class="logo-wrap">
      <img src="../../../../../assets/images/brand-logo.png" class="logo-img" alt="Logo">
    </div>

    <!-- Stepper -->
    <div class="stepper">
      <div class="step completed">
        <div class="step-num">1</div>
        <span>Mess Details</span>
      </div>
      <div class="step-line completed"></div>
      <div class="step completed">
        <div class="step-num">2</div>
        <span>Menu</span>
      </div>
      <div class="step-line completed"></div>
      <div class="step completed">
        <div class="step-num">3</div>
        <span>Price</span>
      </div>
      <div class="step-line active"></div>
      <div class="step active">
        <div class="step-num">4</div>
        <span>Time</span>
      </div>
    </div>

    <!-- Morning Time -->
    <label class="form-label">Morning time</label>
    <div class="time-row section-gap">
      <span class="time-prefix">From</span>
      <mat-form-field appearance="outline" class="time-field">
        <input matInput type="time">
      </mat-form-field>
      <span class="time-prefix">To</span>
      <mat-form-field appearance="outline" class="time-field">
        <input matInput type="time">
      </mat-form-field>
    </div>

    <!-- Evening Time -->
    <label class="form-label">Evening time</label>
    <div class="time-row section-gap">
      <span class="time-prefix">From</span>
      <mat-form-field appearance="outline" class="time-field">
        <input matInput type="time">
      </mat-form-field>
      <span class="time-prefix">To</span>
      <mat-form-field appearance="outline" class="time-field">
        <input matInput type="time">
      </mat-form-field>
    </div>

    <!-- Holiday -->
    <label class="form-label">Holiday</label>
    <mat-form-field appearance="outline" class="full-width section-gap">
      <mat-select placeholder="Select day">
        <mat-option value="Monday">Monday</mat-option>
        <mat-option value="Tuesday">Tuesday</mat-option>
        <mat-option value="Wednesday">Wednesday</mat-option>
        <mat-option value="Thursday">Thursday</mat-option>
        <mat-option value="Friday">Friday</mat-option>
        <mat-option value="Saturday">Saturday</mat-option>
        <mat-option value="Sunday">Sunday</mat-option>
        <mat-option value="None">No Holiday</mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Actions -->
    <div class="actions">
      <button mat-stroked-button class="btn-back" (click)="back()">Back</button>
      <button mat-raised-button class="btn-done" (click)="done()">Done</button>
    </div>

  </mat-card>
</div>
