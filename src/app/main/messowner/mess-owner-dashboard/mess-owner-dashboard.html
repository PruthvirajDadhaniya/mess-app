<div class="dashboard-container">

    <div class="navHead">
        <app-navbar (menuStatus)="onNavbarMenuChange($event)"></app-navbar>
    </div>

    <div class="sidebar-wrapper">
        <!-- Toggle Button -->
        <button class="menu-toggle" [class.hidden]="hideToggle || isSidebarOpen || navbarMenuOpen"
            (click)="toggleSidebar()">
            ☰
        </button>

        @if (isSidebarOpen) {
        <div class="sidebar-overlay" (click)="closeSidebar()"></div>
        }

        <div class="sideDiv" [class.mobile-open]="isSidebarOpen" [class.navbar-menu-open]="navbarMenuOpen">
            <img src="../../../../assets/images/brand-logo.png" alt="Brand Logo" class="mobile-logo">
            <!-- Close Button -->
            <button class="close-sidebar" (click)="closeSidebar()">
                ✕
            </button>
            <app-sidenav (menuClick)="closeSidebar()"></app-sidenav>
        </div>
        <div class="Main-Content">
            <router-outlet></router-outlet>
        </div>
    </div>

    <div class="footerDiv">
        <app-messowner-footer></app-messowner-footer>
    </div>

</div>
